apiVersion: batch/v1
kind: Job
metadata:
  generateName: db-table-dump-
  namespace: credreg-prod
  labels:
    app: db-table-dump
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 14400
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: main-app-service-account
      restartPolicy: Never
      containers:
        - name: pg-dump
          image: postgres:17-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail

              apk add --no-cache aws-cli curl >/dev/null 2>&1

              TIMESTAMP=$(date +%Y%m%d_%H%M%S)
              S3_KEY="table-dumps/${TABLE_NAME}/${TIMESTAMP}.sql.gz"
              NL=$'\n'

              notify_slack() {
                [ -z "${SLACK_WEBHOOK_URL:-}" ] && return 0
                payload=$(printf '{"text":"%s"}' "$(echo "$1" | sed 's/"/\\"/g; s/$/\\n/' | tr -d '\n' | sed 's/\\n$//')")
                curl -sS -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL" || true
              }

              on_failure() {
                notify_slack ":x: *DB dump failed* | table: \`${TABLE_NAME}\`"
              }
              trap on_failure ERR

              echo "Dumping table '${TABLE_NAME}' from ${POSTGRESQL_DATABASE}..."
              PGPASSWORD="${POSTGRESQL_PASSWORD}" pg_dump \
                -h "${POSTGRESQL_ADDRESS}" \
                -U "${POSTGRESQL_USERNAME}" \
                -d "${POSTGRESQL_DATABASE}" \
                -p "${POSTGRESQL_PORT:-5432}" \
                --table "${TABLE_NAME}" \
                --no-owner --no-acl \
                -Fp | \
              gzip | \
              aws s3 cp - "s3://${S3_DUMP_BUCKET}/${S3_KEY}" \
                --region us-east-1 \
                --content-encoding gzip \
                --content-type "text/plain"

              PRESIGNED_URL=$(aws s3 presign "s3://${S3_DUMP_BUCKET}/${S3_KEY}" \
                --expires-in 3600 \
                --region us-east-1)

              notify_slack ":white_check_mark: *DB dump ready*\n‚ÄĘ Table: \`${TABLE_NAME}\`\n‚ÄĘ <${PRESIGNED_URL}|Download SQL dump> _(expires in 1h)_"

              echo "S3_KEY=${S3_KEY}"
          env:
            - name: TABLE_NAME
              value: "__TABLE_NAME__"
            - name: SLACK_WEBHOOK_URL
              value: "__SLACK_WEBHOOK_URL__"
            - name: S3_DUMP_BUCKET
              value: "cer-db-dumps-prod"
          envFrom:
            - secretRef:
                name: app-secrets
            - configMapRef:
                name: main-app-config
