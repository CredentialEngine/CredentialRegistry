apiVersion: batch/v1
kind: Job
metadata:
  generateName: db-table-dump-
  namespace: credreg-prod
  labels:
    app: db-table-dump
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 14400
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: main-app-service-account
      restartPolicy: Never
      containers:
        - name: pg-dump
          image: postgres:17-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail

              apk add --no-cache aws-cli >/dev/null 2>&1

              TIMESTAMP=$(date +%Y%m%d_%H%M%S)
              S3_KEY="table-dumps/${TABLE_NAME}/${TIMESTAMP}.sql.gz"

              echo "Dumping table '${TABLE_NAME}' from ${POSTGRESQL_DATABASE}..."
              PGPASSWORD="${POSTGRESQL_PASSWORD}" pg_dump \
                -h "${POSTGRESQL_ADDRESS}" \
                -U "${POSTGRESQL_USERNAME}" \
                -d "${POSTGRESQL_DATABASE}" \
                -p "${POSTGRESQL_PORT:-5432}" \
                --table "${TABLE_NAME}" \
                --no-owner --no-acl \
                -Fp | \
              gzip | \
              aws s3 cp - "s3://${S3_DUMP_BUCKET}/${S3_KEY}" \
                --region us-east-1 \
                --content-encoding gzip \
                --content-type "text/plain"

              echo "S3_KEY=${S3_KEY}"
          env:
            - name: TABLE_NAME
              value: "__TABLE_NAME__"
            - name: S3_DUMP_BUCKET
              value: "cer-db-dumps-prod"
          envFrom:
            - secretRef:
                name: app-secrets
            - configMapRef:
                name: main-app-config
